<!DOCTYPE html>
<html>

<head>
    <title>Alees' AI Agent</title>
  <style> body { font-family: sans-serif; text-align: center; padding: 50px; background: #121212; color: white; } #status { margin: 20px; color: #00ff00; } button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background: #6200ee; color: white; } button:disabled { background: #333; } #transcript { margin-top: 30px; border: 1px solid #333; padding: 20px; min-height: 100px; background: #1e1e1e; } </style>
</head>

<body>
    <h1>Agentic Voice AI</h1>
    <div id="status">Disconnected</div>
    <button id="recordBtn">Hold to Talk</button>
    <div id="userQuestion" style="margin-top: 20px; padding: 15px; background: #2a2a2a; border-radius: 10px; display: none;">
        <strong>You said:</strong> <span id="userText"></span>
    </div>
    <div id="transcript">AI Response will appear here...</div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const transcript = document.getElementById('transcript');
        const userQuestion = document.getElementById('userQuestion');
        const userText = document.getElementById('userText');
        let socket = new WebSocket("ws://127.0.0.1:8000/ws/chatting");
        socket.binaryType = "arraybuffer";
        let audioContext;
        let processor;
        let source;
        let fullResponse = "";

        socket.onopen = () => {
            status.innerText = "Connected";
        };

        socket.onclose = () => {
            status.innerText = "Disconnected";
        };

        socket.onerror = (error) => {
            status.innerText = "Connection Error";
            console.error("WebSocket error:", error);
        };

        socket.onmessage = (event) => {
            console.log("Received message type:", event.data instanceof ArrayBuffer ? "binary" : "text");
            
            if (event.data instanceof ArrayBuffer) {
                console.log("Playing audio, size:", event.data.byteLength);
                // Play audio (WAV bytes from TTS)
                const blob = new Blob([event.data], { type: 'audio/wav' });
                const audio = new Audio(URL.createObjectURL(blob));
                audio.play().catch(err => console.error("Audio play error:", err));
            } else {
                try {
                    const data = JSON.parse(event.data);
                    console.log("Received JSON:", data);
                    
                    if (data.type === 'user_question') {
                        // Show what user said
                        userText.innerText = data.content;
                        userQuestion.style.display = 'block';
                        // Clear previous AI response
                        transcript.innerText = "AI Response will appear here...";
                        fullResponse = "";
                    } else if (data.type === 'text') {
                        fullResponse += data.content;
                        transcript.innerText = fullResponse;
                    } else if (data.type === 'error') {
                        status.innerText = data.message;
                        transcript.innerText = "Error: " + data.message;
                    }
                } catch (e) {
                    console.error("JSON parse error:", e, "Raw data:", event.data);
                }
            }
        };

        recordBtn.onmousedown = async () => {

            try {

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                audioContext = new AudioContext({ sampleRate: 16000 });

                source = audioContext.createMediaStreamSource(stream);

                processor = audioContext.createScriptProcessor(4096, 1, 1);

                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = (event) => {
                    const input = event.inputBuffer.getChannelData(0);
                    const pcm16 = new Int16Array(input.length);

                    for (let i = 0; i < input.length; i++) {
                        pcm16[i] = Math.max(-1, Math.min(1, input[i])) * 32767;
                    }

                    if (socket.readyState === WebSocket.OPEN) {
                        socket.send(pcm16.buffer);
                        console.log("Sent audio chunk, size:", pcm16.buffer.byteLength);
                    }
                };

                recordBtn.innerText = "Listening...";
                recordBtn.style.background = "#ff1744";

            } catch (err) {
                console.error("Mic access denied:", err);
                status.innerText = "Error: Mic access denied";
            }

        };

        recordBtn.onmouseup = () => {

            if (processor) processor.disconnect();
            if (source) source.disconnect();

            recordBtn.innerText = "Hold to Talk";
            recordBtn.style.background = "#6200ee";

        };
    </script>
</body>

</html>
